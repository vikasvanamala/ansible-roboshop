- name: setup frontend
  hosts: frontend
  become: yes
  tasks: 
  - name: disable nginx
    ansible.builtin.command: dnf disable nginx -y

  - name: enable nginx
    ansible.builtin.command: dnf enable nginx:1.24 -y

  - name: install nginx
    ansible.builtin.package:
      name: nginx
      state: present

  - name: remove html directory
    ansible.builtin.file:
      path: /usr/share/nginx/html/
      state: absent

  - name: creating html directory
    ansible.builtin.file:
      path: /usr/share/nginx/html/
      state: directory

  - name: downloading frontend content
    ansible.builtin.geturl:
      url: https://roboshop-artifacts.s3.amazonaws.com/frontend-v3.zip
      dest: /tmp/frontend.zip

  - name: extracting frontend content
    ansible.builtin.archive:
      src: /tmp/frontend.zip
      dest: /usr/share/nginx/html/
      remote_src: yes

  - name: delete default nginx.conf
    ansible.builtin.file:
      path: /etc/nginx/nginx.conf
      state: absent

  - name: copy nginx.conf
    ansible.builtin.copy:
      src: nginx.conf
      dest: /etc/nginx/nginx.conf 

  - name: start and enable nginx
    ansible.builtin.service:
      name: nginx
      state: restarted
      enabled: true

  
